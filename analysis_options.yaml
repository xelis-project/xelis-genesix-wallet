include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "rust_builder/**"
    - "lib/src/generated/**"
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - build/**
    - android/**
    - ios/**
    - web/**
    - windows/**
    - macos/**
    - linux/**
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
