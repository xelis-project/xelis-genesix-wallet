name: Build Android

on:
  workflow_call:
    inputs:
      version:
        description: Build version used in artifact names
        required: true
        type: string
      ref:
        description: Git ref to build
        required: true
        type: string
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_KEYSTORE_PASSWORD:
        required: true
      ANDROID_KEY_PASSWORD:
        required: true
      ANDROID_KEY_ALIAS:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: Build version used in artifact names (e.g. 0.1.3-test)
        required: true
        type: string
      ref:
        description: Git ref to build (defaults to the selected branch)
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

env:
  FRB_CODEGEN_VERSION: 2.12.0

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_VERSION: ${{ inputs.version }}
      BUILD_REF: ${{ inputs.ref || github.ref }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter Rust bridge
        run: cargo install flutter_rust_bridge_codegen --version "$FRB_CODEGEN_VERSION" --locked

      - name: Install dependencies
        run: flutter pub get

      - name: Generate bridge code
        run: flutter_rust_bridge_codegen generate

      - name: Generate Dart code
        run: dart run build_runner build

      - name: Prepare Android signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          : "${ANDROID_KEYSTORE_BASE64:?Missing ANDROID_KEYSTORE_BASE64 secret}"
          : "${ANDROID_KEYSTORE_PASSWORD:?Missing ANDROID_KEYSTORE_PASSWORD secret}"
          : "${ANDROID_KEY_PASSWORD:?Missing ANDROID_KEY_PASSWORD secret}"
          : "${ANDROID_KEY_ALIAS:?Missing ANDROID_KEY_ALIAS secret}"

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/genesix-release.jks
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=genesix-release.jks
          EOF

      - name: Build Android APKs (arm64-v8a + armeabi-v7a)
        run: flutter build apk --release --target-platform android-arm64,android-arm --split-per-abi

      - name: Rename APKs for end users
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/android

          ARM64_SRC="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          ARMV7_SRC="build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk"

          if [[ ! -f "$ARM64_SRC" ]]; then
            echo "Missing APK: $ARM64_SRC"
            exit 1
          fi
          if [[ ! -f "$ARMV7_SRC" ]]; then
            echo "Missing APK: $ARMV7_SRC"
            exit 1
          fi

          cp "$ARM64_SRC" "dist/android/genesix-android-${BUILD_VERSION}-64bit-arm.apk"
          cp "$ARMV7_SRC" "dist/android/genesix-android-${BUILD_VERSION}-32bit-arm.apk"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-android-${{ env.BUILD_VERSION }}
          path: dist/android/*.apk
          if-no-files-found: error
