name: Checks · Dev · Branch Gate

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]
  workflow_dispatch:

run-name: "Checks • ${{ github.event_name }} • ${{ github.ref_name }}"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-checks-dev-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # GitHub merge commits were already validated through pull_request.
    # Direct pushes and non-PR merge commits still run the core checks.
    if: >-
      github.event_name != 'push' ||
      !startsWith(github.event.head_commit.message, 'Merge pull request #')
    name: Checks · Dev · Run Core
    uses: ./.github/workflows/ci_checks_reusable.yml
    with:
      dart_analyze_args: --no-fatal-warnings
