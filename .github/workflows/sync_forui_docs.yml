name: Docs · Sync Forui LLMs

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-forui-docs:
    name: Sync Forui docs snapshots
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Sync Forui docs
        run: dart run tool/sync_forui_docs.dart

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/sync-forui-docs
          commit-message: "docs(ai): sync Forui LLM docs"
          title: "docs(ai): sync Forui LLM docs"
          body: |
            Updates the local Forui `llms.txt` and `llms-full.txt` snapshots used by AI guidelines.
          labels: documentation
