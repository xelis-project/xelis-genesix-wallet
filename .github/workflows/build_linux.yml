name: Build Linux

on:
  workflow_call:
    inputs:
      version:
        description: Build version used in artifact names
        required: true
        type: string
      ref:
        description: Git ref to build
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Build version used in artifact names (e.g. 0.1.3-test)
        required: true
        type: string
      ref:
        description: Git ref to build (defaults to the selected branch)
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: build-linux-${{ github.ref }}
  cancel-in-progress: true

env:
  FRB_CODEGEN_VERSION: 2.12.0

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      BUILD_VERSION: ${{ inputs.version }}
      BUILD_REF: ${{ inputs.ref || github.ref }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Update packages
        run: sudo apt-get update -y

      - name: Install system libraries
        run: sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter Rust bridge
        run: cargo install flutter_rust_bridge_codegen --version "$FRB_CODEGEN_VERSION" --locked

      - name: Install dependencies
        run: flutter pub get

      - name: Generate bridge code
        run: flutter_rust_bridge_codegen generate

      - name: Generate Dart code
        run: dart run build_runner build

      - name: Build Linux app
        run: flutter build linux --release

      - name: Package Linux archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/linux
          tar -C build/linux/x64/release -czf "dist/linux/genesix-linux-${BUILD_VERSION}-x64.tar.gz" bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ env.BUILD_VERSION }}
          path: dist/linux/*.tar.gz
          if-no-files-found: error
