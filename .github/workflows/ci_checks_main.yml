name: Checks · Main · Branch Gate

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

run-name: "Checks • ${{ github.event_name }} • ${{ github.ref_name }}"

permissions:
  contents: read

concurrency:
  group: ci-checks-main-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Checks · Main · Run Core
    uses: ./.github/workflows/ci_checks_reusable.yml
