name: genesix
description: Secure and intuitive cross-platform wallet for the XELIS network.
publish_to: 'none'

version: 0.2.0

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  path: ^1.9.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_form_builder: ^10.3.0+2
  flutter_riverpod: ^3.3.1
  form_builder_validators: ^11.3.0
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  intl: ^0.20.2
  json_annotation: 4.11.0
  logging: ^1.3.0
  path_provider: ^2.1.6
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.5
  xelis_dart_sdk: ^0.34.0
  pretty_qr_code: ^3.6.0
  mobile_scanner: ^7.2.0
  flutter_native_splash: ^2.4.8
  window_manager: ^0.5.2
  country_flags: ^4.1.2
  package_info_plus: ^9.0.1
  file_picker: ^11.0.2
  url_launcher: ^6.3.2
  localstorage: ^6.0.0
  talker_flutter: ^5.1.16
  talker_riverpod_logger: ^5.1.17
  http: ^1.6.0
  io: ^1.0.5
  flutter_secure_storage: ^10.3.1
  local_auth: ^3.0.2
  web: ^1.1.1
  infinite_scroll_pagination: ^5.1.1
  forui: ^0.23.0
  animations: ^2.2.0
  jovial_svg: ^1.1.30
  fl_chart: ^1.2.0
  skeletonizer: ^2.1.3
  recase: ^4.1.0
  cupertino_icons: ^1.0.9
  flutter_local_notifications: ^22.0.1

  flutter_rust_bridge: 2.12.0
  rust_builder:
    path: rust_builder
  flutter_hashicon:
    git: https://github.com/xelis-project/flutter-hashicon.git

dev_dependencies:
  build_runner: ^2.15.1
  crypto: ^3.0.7
  go_router_builder: ^4.3.0
  flutter_lints: ^6.0.0
  freezed: 3.2.5
  icons_launcher: ^3.1.0
  json_serializable: 6.13.0
  riverpod_generator: 4.0.3
  riverpod_lint: 3.1.3
  msix: ^3.18.0
  #  flutter_test:
  #    sdk: flutter
  #  integration_test:
  #    sdk: flutter


flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/png/circle/green_background_black_logo.png
    - assets/genesix/svg/genesix-wallet-one-line_white.svg
    - assets/genesix/svg/genesix-wallet-one-line_black.svg
    - news/index.json

msix_config:
  display_name: Genesix Wallet
  publisher_display_name: XELIS
  logo_path: assets/icons/png/circle/green_background_black_logo.png
